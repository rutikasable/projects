<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice</title>
</head>
<body>
    <h1>DICE ROLLER</h1>
    <h4>How many times do you want to roll the dice?<br>Enter the number below.</h4>
    <br>
    <div>
        <input id="ip" type="number" placeholder="Enter a number here.">
        <br><br>
        <button id="bt">ROLL</button>
    </div>
    <br>
    <div id="op">
        <div id="dice">
            
        </div>
    </div>
</body>

<style>
    body {
        background-color: #454545;
        color: aliceblue;
        text-align: center;
    }

    #ip {
        text-align: center;
    }

    #op {
        display: flex;
        justify-content: center;
    }

    #dice {
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 200px;
    }
</style>

<script>
    let ip = document.querySelector("#ip");
    let button = document.querySelector("#bt");
    let output = document.querySelector("#dice");

    ip.addEventListener('focus',function() {
        output.innerHTML = "";
    })

    let interval;

    button.addEventListener('click', function () {
        let input = Number(ip.value);

        if (input <= 0 || isNaN(input)) {
            alert("Enter a valid number");
            return;
        }

        let count = 0;

        clearInterval(interval);

        interval = setInterval(function () {
            const dice = ["⚀","⚁","⚂","⚃","⚄","⚅"];
            let r = Math.floor(Math.random()*6);
            output.textContent = dice[r];
            count++;
            
            if (count === input){
                clearInterval(interval);
            }
        },100);

    })

</script>

</html>
