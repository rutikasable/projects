<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="setOperator('%')">%</button>
            <button onclick="setOperator('/')">/</button>
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="setOperator('*')">*</button>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="setOperator('-')">-</button>
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="setOperator('+')">+</button>
            <button onclick="changeSign()">+/-</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()">=</button>
        </div>
    </div>
</body>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#222;
    }

    .calculator{
        background:#333;
        padding:20px;
        border-radius:10px;
    }

    #display{
        width:100%;
        height:90px;
        margin-bottom:15px;
        text-align:right;
        font-size:25px;
        padding:10px;
        border-radius: 10px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,90px);
        gap:8px;
    }

    button{
        height:90px;
        font-size:20px;
        cursor:pointer;
        border:none;
        border-radius:10px;
        transition:.2s;
    }

    button:hover{
        opacity:.8;
    }

</style>

<script>
    const display = document.getElementById("display");

    let firstnum = "";
    let secondnum = "";
    let oper = "";

    function append(value) {

        // Prevent multiple decimal points
        if (value === ".") {
            if (oper === "") {
                if (firstnum.includes(".")) return;
            } else {
                if (secondnum.includes(".")) return;
            }
        }

        if (oper === "") {
            firstnum += value;
            display.value = firstnum;
        } else {
            secondnum += value;
            display.value = firstnum + oper + secondnum;
        }
    }

    function clearDisplay() {
        firstnum = "";
        secondnum = "";
        oper = "";
        display.value = "";
    }

    function backspace() {

        if (oper === "") {

            firstnum = firstnum.slice(0, -1);
            display.value = firstnum;

        } else if (secondnum === "") {

            oper = "";
            display.value = firstnum;

        } else {

            secondnum = secondnum.slice(0, -1);
            display.value = firstnum + oper + secondnum;

        }
    }

    function setOperator(op) {

        if (firstnum === "") return;

        // Change operator if second number hasn't been entered yet
        if (oper !== "" && secondnum === "") {
            oper = op;
            display.value = firstnum + oper;
            return;
        }

        // If already typing second number, calculate first
        if (secondnum !== "") {
            calculate();
        }

        oper = op;
        display.value = firstnum + oper;
    }

    function calculate() {

        if (firstnum === "" || secondnum === "" || oper === "") return;

        const num1 = Number(firstnum);
        const num2 = Number(secondnum);

        let answer;

        switch (oper) {

            case "+":
                answer = num1 + num2;
                break;

            case "-":
                answer = num1 - num2;
                break;

            case "*":
                answer = num1 * num2;
                break;

            case "/":
                if (num2 === 0) {
                    alert("Cannot divide by zero");
                    clearDisplay();
                    return;
                }
                answer = num1 / num2;
                break;

            case "%":
                answer = num1 % num2;
                break;

            default:
                return;
        }

        display.value = answer;

        // Store result for further calculations
        firstnum = String(answer);
        secondnum = "";
        oper = "";
    }

    function changeSign() {

        if (oper === "") {

            if (firstnum === "") return;

            firstnum = String(Number(firstnum) * -1);
            display.value = firstnum;

        } else {

            if (secondnum === "") return;

            secondnum = String(Number(secondnum) * -1);
            display.value = firstnum + oper + secondnum;

        }
    }
</script>

</html>
