<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
</head>
<body>
    <div id="card">
        <div id="ips">
            <input id="city" placeholder="Enter a Place"><br><br>
            <button id="btn">GET</button>
            <br>
        </div>
        
        <div id="icon"></div>
        
        <div id="ops"></div>

        <button id="more" style="display:none;">Show More</button>

        <div id="extra" class="hidden"></div>
    </div>

</body>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

#card{
    width:1200px;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    color:white;
}

#ips{
    text-align:center;
}

#city{
    width:75%;
    padding:14px 18px;
    font-size:17px;
    border:none;
    border-radius:50px;
    outline:none;
    background:rgba(255,255,255,.15);
    color:white;
    transition:.3s;
    text-align:center;  
}

#city::placeholder{
    color:#d1d5db;
    text-align:center;
}

#city:focus{
    background:rgba(255,255,255,.25);
    border:2px solid #7dd3fc;
}

#btn{
    margin-top:18px;
    padding:12px 35px;
    font-size:17px;
    border:none;
    border-radius:50px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    transition:.25s;
}

#btn:hover{
    background:#0ea5e9;
    transform:scale(1.05);
}

#btn:active{
    transform:scale(.96);
}

#icon{
    margin:30px 0;
    text-align:center;
}

#icon img{
    width:140px;
    height:140px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    padding:10px;
}

#icon h1{
    margin-bottom:10px;
    font-size:38px;
    font-weight:700;
}

#icon h2{
    margin-top:10px;
    font-size:28px;
    color:#7dd3fc;
    font-weight:600;
}

#ops{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:18px;
    margin-top:20px;
}

#ops img{
    width:130px;
    height:130px;
    grid-column:1/3;
    justify-self:center;
}

.item{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:.25s;
    min-height:130px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:10px;

    transition:0.3s;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px);
}

.item:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 12px 20px rgba(0,0,0,.25);
}

.item h3{
    color:#7dd3fc;
    margin-bottom:8px;
}

.item p{
    font-size:18px;
    color:white;
}

#more{
    margin-top:25px;
    width:100%;
    padding:13px;
    border:none;
    border-radius:50px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    font-size:17px;
    transition:.25s;
}

#more:hover{
    background:#0ea5e9;
    transform:scale(1.02);
}

#extra{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    animation:fade .4s ease;
}

#extra .item{
    background:rgba(255,255,255,.08);
}

.hidden{
    display:none !important;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

<script>
    let city = document.querySelector("#city");
    let btn = document.querySelector("#btn");

    let icon = document.querySelector("#icon");
    let ops = document.querySelector("#ops");

    let more = document.querySelector("#more");
    let extra = document.querySelector("#extra");
    
    let apikey = "9dcb6c323d344dd3a82160043262007";

    more.addEventListener("click", () => {

        extra.classList.toggle("hidden");

        if (extra.classList.contains("hidden")) {
            more.textContent = "Show More";
        } else {
            more.textContent = "Show Less";
        }

    });



    btn.addEventListener("click", function(){
        btn.disabled = true;
        btn.textContent = "Loading...";
        getweather();
    })

    city.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
            btn.disabled = true;
            btn.textContent = "Loading...";
            getweather();
        }
    });

    async function getweather() {

        btn.disabled = false;
        btn.textContent = "GET";

        ops.innerHTML = "";
        extra.innerHTML = "";
        icon.innerHTML = "";

        let url = `https://api.weatherapi.com/v1/current.json?key=${apikey}&q=${encodeURIComponent(city.value)}`;

        try {

            const response = await fetch(url);
            const data = await response.json();

            if(data.error){
                alert(data.error.message);
                return;
            }

            icon.innerHTML = `
            <h1>${data.location.name}, ${data.location.country}</h1>
            <img src="https:${data.current.condition.icon}">
            <h2>${data.current.condition.text}</h2>
            `;


            ops.innerHTML = `

            <div class="item">
                <h3>City</h3>
                <p>${data.location.name}</p>
            </div>

            <div class="item">
                <h3>Region</h3>
                <p>${data.location.region}</p>
            </div>

            <div class="item">
                <h3>Country</h3>
                <p>${data.location.country}</p>
            </div>

            <div class="item">
                <h3>Temperature</h3>
                <p>${data.current.temp_c} °C</p>
            </div>

            <div class="item">
                <h3>Condition</h3>
                <p>${data.current.condition.text}</p>
            </div>

            <div class="item">
                <h3>Humidity</h3>
                <p>${data.current.humidity} %</p>
            </div>

            <div class="item">
                <h3>Wind Speed</h3>
                <p>${data.current.wind_kph} km/h</p>
            </div>

            <div class="item">
                <h3>Feels Like</h3>
                <p>${data.current.feelslike_c} °C</p>
            </div>

            <div class="item">
                <h3>UV Index</h3>
                <p>${data.current.uv}</p>
            </div>

            <div class="item">
                <h3>Pressure</h3>
                <p>${data.current.pressure_mb} mb</p>
            </div>
            `;

            extra.innerHTML = `

            <div class="item">
                <h3>Latitude & Longitude</h3>
                <p>${data.location.lat} ° & ${data.location.lon} °</p>
            </div>

            <div class="item">
                <h3>Cloud Cover</h3>
                <p>${data.current.cloud} %</p>
            </div>

            <div class="item">
                <h3>Chance of Rain</h3>
                <p>${data.current.chance_of_rain} %</p>
            </div>

            <div class="item">
                <h3>Chance of Snow</h3>
                <p>${data.current.chance_of_snow} %</p>
            </div>

            <div class="item">
                <h3>Dew Point</h3>
                <p>${data.current.dewpoint_c} °C</p>
            </div>

            <div class="item">
                <h3>Heat Index</h3>
                <p>${data.current.heatindex_c} °C</p>
            </div>

            <div class="item">
                <h3>Precipitation</h3>
                <p>${data.current.precip_mm} mm</p>
            </div>

            <div class="item">
                <h3>Wind Degree</h3>
                <p>${data.current.wind_degree} °</p>
            </div>

            <div class="item">
                <h3>Wind Direction</h3>
                <p>${data.current.wind_dir}</p>
            </div>

            <div class="item">
                <h3>Wind Chill</h3>
                <p>${data.current.windchill_c} °C</p>
            </div>
            `;

            more.style.display = "block";
            extra.classList.add("hidden");
            more.textContent = "Show More";            
                    
        }

        catch(error) {
            console.log(error);
        }
    
    }

</script>
</html>
