<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes</title>
</head>
<body>
    <div>
        <p id="qg">Quotes Generator</p><br>
        <button id="get">Get Quote</button><br><br><br><br>
        <div id="display">

        </div>
    </div>
</body>


<style>

    body {
        background-color: #313131;
        color: aliceblue;
        text-align: center;
    }

    #qg{
        font-size: xx-large;
    }

    #get{
        font-size: larger;
    }

    #display {
        font-size:x-large;
    }
</style>


<script>
    
    let arr = [
    {
        quote: "Stay hungry. Stay foolish.",
        author: "Steve Jobs"
    },
    {
        quote: "The people who are crazy enough to think they can change the world are the ones who do.",
        author: "Steve Jobs"
    },
    {
        quote: "Talk is cheap. Show me the code.",
        author: "Linus Torvalds"
    },
    {
        quote: "Premature optimization is the root of all evil.",
        author: "Donald Knuth"
    },
    {
        quote: "The best way to predict the future is to invent it.",
        author: "Alan Kay"
    },
    {
        quote: "Simplicity is prerequisite for reliability.",
        author: "Edsger W. Dijkstra"
    },
    {
        quote: "The most dangerous phrase in the language is, 'We've always done it this way.'",
        author: "Grace Hopper"
    },
    {
        quote: "There was no choice but to be pioneers.",
        author: "Margaret Hamilton"
    },
    {
        quote: "The Web is for everyone.",
        author: "Tim Berners-Lee"
    },
    {
        quote: "Your most unhappy customers are your greatest source of learning.",
        author: "Bill Gates"
    },
    {
        quote: "Success is a lousy teacher.",
        author: "Bill Gates"
    },
    {
        quote: "If you double the number of experiments you do per year, you're going to double your inventiveness.",
        author: "Jeff Bezos"
    },
    {
        quote: "The biggest risk is not taking any risk.",
        author: "Mark Zuckerberg"
    },
    {
        quote: "Always deliver more than expected.",
        author: "Larry Page"
    },
    {
        quote: "Programs must be written for people to read, and only incidentally for machines to execute.",
        author: "Harold Abelson"
    },
    {
        quote: "First, solve the problem. Then, write the code.",
        author: "John Johnson"
    },
    {
        quote: "The function of good software is to make the complex appear to be simple.",
        author: "Grady Booch"
    },
    {
        quote: "Controlling complexity is the essence of computer programming.",
        author: "Brian Kernighan"
    },
    {
        quote: "Code is like humor. When you have to explain it, it's bad.",
        author: "Cory House"
    },
    {
        quote: "Measuring programming progress by lines of code is like measuring aircraft building progress by weight.",
        author: "Bill Gates"
    }
];
    
    let display = document.querySelector("#display"); 
    let get = document.querySelector("#get");

    get.addEventListener('click', function (){

        let num = Math.floor(Math.random()*arr.length);
        display.innerHTML = `<p>${arr[num].quote}</p><h4>— ${arr[num].author}</h4>`;
        
    })


</script>

</html>
