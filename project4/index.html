<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Game</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>

   <div>
      <br>

      <h1>NUMBER GUESSING GAME</h1>
      <br>

      <div>
        <h3>
          Try and guess a number between 1 to 100.<br>
          You have 10 attempts to guess the exact right number.
        </h3>
      </div>
      <br>

      <h1>GUESS A NUMBER</h1>

      <p><input id="input" type="number" placeholder="Enter a number here"><p>

      <p><button id="button">SUBMIT</button></p>
      <br>

      <div id="result">
        <h3>
            <p>Previous Guesses : <span  id="preguess"></span></p>
            <p>Guesses Remaining : <span  id="remguess">10</span></p>
            <p class="loworhigh">
              <p id="comment"></p><p id="win"></p><p id="loss"></p>
            </p>
        </h3>
      </div>
      <p id="restart"></p>
    </div>

  </body>
</html>
