<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>BMI CALCULATOR</h1>
      <form class="form">
        <p><label>HEIGHT :</label>&nbsp;&nbsp;&nbsp;<input class="input" type="text" id="h" placeholder="cm"></p>
        <p><label>WEIGHT :</label>&nbsp;&nbsp;<input class="input" type="text" id="w" placeholder="kg"></p>
        <p class="button"><button>CALCULATE</button></p>
        <div id="result"></div>
      </form>
      <p>&nbsp&nbsp&nbsp&nbsp&nbspBMI GUIDE</p>
      <ul>
        <li>0 - 18.5 : Underweight</li>
        <li>18.5 - 25 : Normal</li>
        <li>25 - 30 : Overweight</li>
        <li>30 - 40 or more : Obese</li>
      </ul>
    </div>
  </body>
</html>
